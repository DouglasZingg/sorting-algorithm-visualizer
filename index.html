<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sorting Algorithm Visualizer</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111827;
            color: #f9fafb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
        }

        h1 {
            margin: 0 0 8px;
            text-align: center;
        }

        .subtitle {
            color: #9ca3af;
            margin: 0 0 24px;
            text-align: center;
        }

        .controls,
        .stats,
        .description {
            width: min(100%, 1000px);
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-items: center;
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            color: #d1d5db;
        }

        .description {
            color: #d1d5db;
            line-height: 1.5;
        }

            .description strong,
            .stats strong {
                color: #f9fafb;
            }

        button,
        select,
        input {
            border: none;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            max-width: 100%;
        }

        button {
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

            button:hover:not(:disabled) {
                background: #1d4ed8;
            }

            button:disabled,
            select:disabled,
            input:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

        select,
        input {
            background: #374151;
            color: white;
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #d1d5db;
            font-size: 14px;
            min-width: 0;
        }

        input[type="range"] {
            width: 130px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            padding: 0;
        }

        #bar-container {
            width: min(100%, 1000px);
            height: 420px;
            background: #030712;
            border: 1px solid #374151;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: flex-end;
            gap: 3px;
            overflow: hidden;
        }

        .bar {
            flex: 1;
            background: #3b82f6;
            border-radius: 4px 4px 0 0;
            transition: height 0.08s linear, background-color 0.08s linear, box-shadow 0.08s linear, outline 0.08s linear;
        }

            .bar.range {
                outline: 2px solid #0ea5e9;
                outline-offset: -2px;
            }

            .bar.compare {
                background: #fde047;
                box-shadow: 0 0 12px rgba(253, 224, 71, 0.7);
            }

            .bar.swap {
                background: #fb923c;
                box-shadow: 0 0 12px rgba(251, 146, 60, 0.8);
            }

            .bar.sorted {
                background: #22c55e;
                box-shadow: none;
            }

            .bar.pivot {
                outline: 3px solid #e879f9;
                outline-offset: -3px;
            }

            .bar.current {
                border-top: 5px solid #f9fafb;
            }

        .status {
            margin-top: 16px;
            color: #d1d5db;
            min-height: 24px;
            text-align: center;
        }

        @media (max-width: 800px) {
            .controls {
                display: grid;
                grid-template-columns: 1fr 1fr;
                align-items: center;
            }

                .controls button,
                .controls label {
                    width: 100%;
                }

                .controls label {
                    justify-content: space-between;
                }

                .controls select,
                .controls input[type="range"] {
                    flex: 1;
                }

            .stats {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                text-align: center;
            }
        }

        @media (max-width: 650px) {
            body {
                padding: 16px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .subtitle {
                font-size: 0.95rem;
            }

            .controls {
                grid-template-columns: 1fr;
            }

                .controls label {
                    flex-wrap: wrap;
                }

                .controls select,
                .controls input[type="range"] {
                    width: 100%;
                }

            .stats {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .description {
                font-size: 13px;
            }

            #bar-container {
                height: 320px;
                gap: 2px;
                padding: 8px;
            }
        }

        @media (max-width: 420px) {
            body {
                padding: 12px;
            }

            .controls,
            .stats,
            .description {
                padding: 12px;
            }

            #bar-container {
                height: 260px;
                gap: 1px;
            }

            button,
            select,
            input {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <h1>Sorting Algorithm Visualizer</h1>
    <p class="subtitle">Watch common sorting algorithms compare, swap, move, and finish.</p>

    <div class="controls">
        <button id="randomizeBtn">Randomize</button>

        <label>
            Algorithm
            <select id="algorithmSelect">
                <option value="bubble">Bubble Sort</option>
                <option value="selection">Selection Sort</option>
                <option value="insertion">Insertion Sort</option>
                <option value="quick">Quick Sort</option>
                <option value="merge">Merge Sort</option>
                <option value="heap">Heap Sort</option>
                <option value="shell">Shell Sort</option>
            </select>
        </label>

        <label>
            Bars
            <input id="sizeSlider" type="range" min="10" max="100" value="40" />
            <span id="sizeValue">40</span>
        </label>

        <label>
            Speed
            <input id="speedSlider" type="range" min="5" max="250" value="60" />
            <span id="speedValue">60ms</span>
        </label>

        <label>
            Sound
            <input id="soundToggle" type="checkbox" />
        </label>

        <button id="sortBtn">Start Sort</button>
        <button id="pauseBtn" disabled>Pause</button>
        <button id="resumeBtn" disabled>Resume</button>
        <button id="stepBtn" disabled>Step</button>
    </div>

    <div id="descriptionPanel" class="description"></div>

    <div class="stats">
        <div><strong>Comparisons:</strong> <span id="comparisonCount">0</span></div>
        <div><strong>Swaps / Moves:</strong> <span id="swapCount">0</span></div>
        <div><strong>Elapsed:</strong> <span id="elapsedTime">0.00s</span></div>
    </div>

    <div id="bar-container"></div>
    <div id="status" class="status">Ready.</div>

    <script>
        const barContainer = document.getElementById("bar-container");
        const randomizeBtn = document.getElementById("randomizeBtn");
        const sortBtn = document.getElementById("sortBtn");
        const pauseBtn = document.getElementById("pauseBtn");
        const resumeBtn = document.getElementById("resumeBtn");
        const stepBtn = document.getElementById("stepBtn");
        const algorithmSelect = document.getElementById("algorithmSelect");
        const sizeSlider = document.getElementById("sizeSlider");
        const speedSlider = document.getElementById("speedSlider");
        const soundToggle = document.getElementById("soundToggle");
        const sizeValue = document.getElementById("sizeValue");
        const speedValue = document.getElementById("speedValue");
        const statusText = document.getElementById("status");
        const comparisonCount = document.getElementById("comparisonCount");
        const swapCount = document.getElementById("swapCount");
        const elapsedTime = document.getElementById("elapsedTime");
        const descriptionPanel = document.getElementById("descriptionPanel");

        const descriptions = {
            bubble: "<strong>Bubble Sort:</strong> Repeatedly compares adjacent elements and swaps them if they are in the wrong order. Simple but inefficient: O(n²).",
            selection: "<strong>Selection Sort:</strong> Repeatedly selects the smallest element and moves it to the front. O(n²), but usually performs fewer swaps than Bubble Sort.",
            insertion: "<strong>Insertion Sort:</strong> Builds a sorted section one item at a time by inserting each value into its correct position. Strong for small or nearly sorted arrays.",
            quick: "<strong>Quick Sort:</strong> Picks a pivot, partitions values around it, then recursively sorts each side. Very fast on average: O(n log n).",
            merge: "<strong>Merge Sort:</strong> Splits the array into halves, sorts each half, then merges them back together. Stable and consistently O(n log n).",
            heap: "<strong>Heap Sort:</strong> Builds a max heap, then repeatedly moves the largest value to the sorted end of the array. Consistently O(n log n) and sorts in place.",
            shell: "<strong>Shell Sort:</strong> Improves Insertion Sort by comparing far-apart values first, then reducing the gap until the final pass is a normal insertion-style sort."
        };

        let values = [];
        let isSorting = false;
        let isPaused = false;
        let stepRequested = false;

        let comparisons = 0;
        let swaps = 0;
        let elapsedMs = 0;
        let timerInterval = null;
        let lastTimerTick = 0;

        let audioContext = null;

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function getDelay() {
            return Number(speedSlider.value);
        }

        function updateDescription() {
            descriptionPanel.innerHTML = descriptions[algorithmSelect.value] || "";
        }

        function resetStats() {
            comparisons = 0;
            swaps = 0;
            elapsedMs = 0;
            clearInterval(timerInterval);
            timerInterval = null;
            comparisonCount.textContent = "0";
            swapCount.textContent = "0";
            elapsedTime.textContent = "0.00s";
        }

        function updateStats() {
            comparisonCount.textContent = comparisons;
            swapCount.textContent = swaps;
            elapsedTime.textContent = `${(elapsedMs / 1000).toFixed(2)}s`;
        }

        function startTimer() {
            clearInterval(timerInterval);
            lastTimerTick = performance.now();

            timerInterval = setInterval(() => {
                const now = performance.now();

                if (!isPaused) {
                    elapsedMs += now - lastTimerTick;
                    updateStats();
                }

                lastTimerTick = now;
            }, 100);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            updateStats();
        }

        function playSound(value, type = "compare") {
            if (!soundToggle.checked) return;

            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            if (audioContext.state === "suspended") {
                audioContext.resume();
            }

            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();
            const frequency = 150 + value * 2;

            oscillator.frequency.value = frequency;
            oscillator.type = type === "swap" ? "square" : "sine";
            gain.gain.setValueAtTime(0.04, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.05);

            oscillator.connect(gain);
            gain.connect(audioContext.destination);
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.05);
        }

        function addComparison(soundValue = null) {
            comparisons++;
            if (soundValue !== null) playSound(soundValue, "compare");
            updateStats();
        }

        function addSwap(soundValue = null) {
            swaps++;
            if (soundValue !== null) playSound(soundValue, "swap");
            updateStats();
        }

        async function waitForNextAction() {
            while (isPaused && !stepRequested) {
                await sleep(25);
            }

            if (stepRequested) {
                stepRequested = false;
                isPaused = true;
                return;
            }

            let remainingDelay = getDelay();

            while (remainingDelay > 0) {
                if (isPaused) {
                    return waitForNextAction();
                }

                const chunk = Math.min(25, remainingDelay);
                await sleep(chunk);
                remainingDelay -= chunk;
            }
        }

        function getSortedTail(sortedCount) {
            const sorted = [];
            for (let i = values.length - sortedCount; i < values.length; i++) {
                if (i >= 0) sorted.push(i);
            }
            return sorted;
        }

        function getRangeIndices(start, end) {
            const range = [];
            for (let i = start; i <= end; i++) {
                if (i >= 0 && i < values.length) range.push(i);
            }
            return range;
        }

        function renderBars({
            compare = [],
            swap = [],
            sorted = [],
            pivot = [],
            current = [],
            range = []
        } = {}) {
            barContainer.innerHTML = "";

            values.forEach((value, index) => {
                const bar = document.createElement("div");
                bar.classList.add("bar");
                bar.style.height = `${value}px`;

                if (range.includes(index)) bar.classList.add("range");
                if (sorted.includes(index)) bar.classList.add("sorted");
                if (compare.includes(index)) bar.classList.add("compare");
                if (swap.includes(index)) bar.classList.add("swap");
                if (pivot.includes(index)) bar.classList.add("pivot");
                if (current.includes(index)) bar.classList.add("current");

                barContainer.appendChild(bar);
            });
        }

        function generateArray() {
            const size = Number(sizeSlider.value);
            values = [];

            for (let i = 0; i < size; i++) {
                values.push(Math.floor(Math.random() * 390) + 20);
            }

            resetStats();
            renderBars();
            statusText.textContent = "Array randomized.";
        }

        async function markAllSorted() {
            for (let i = 0; i < values.length; i++) {
                renderBars({ sorted: getRangeIndices(0, i) });
                playSound(values[i], "compare");
                await sleep(18);
            }
        }

        function setSortingState(sorting) {
            isSorting = sorting;
            randomizeBtn.disabled = sorting;
            sortBtn.disabled = sorting;
            algorithmSelect.disabled = sorting;
            sizeSlider.disabled = sorting;

            pauseBtn.disabled = !sorting;
            resumeBtn.disabled = true;
            stepBtn.disabled = !sorting;

            if (!sorting) {
                isPaused = false;
                stepRequested = false;
            }
        }

        function pauseSort() {
            if (!isSorting) return;
            isPaused = true;
            stepRequested = false;
            pauseBtn.disabled = true;
            resumeBtn.disabled = false;
            stepBtn.disabled = false;
            statusText.textContent = "Sorting paused. Use Resume or Step.";
        }

        function resumeSort() {
            if (!isSorting) return;
            isPaused = false;
            stepRequested = false;
            pauseBtn.disabled = false;
            resumeBtn.disabled = true;
            stepBtn.disabled = false;
            statusText.textContent = `Running ${algorithmSelect.options[algorithmSelect.selectedIndex].text}...`;
        }

        function stepSort() {
            if (!isSorting) return;
            stepRequested = true;
            isPaused = true;
            pauseBtn.disabled = true;
            resumeBtn.disabled = false;
            stepBtn.disabled = false;
            statusText.textContent = "Stepping through sort.";
        }

        async function bubbleSort() {
            for (let i = 0; i < values.length - 1; i++) {
                for (let j = 0; j < values.length - i - 1; j++) {
                    renderBars({ compare: [j, j + 1], sorted: getSortedTail(i) });
                    await waitForNextAction();

                    addComparison(values[j]);

                    if (values[j] > values[j + 1]) {
                        [values[j], values[j + 1]] = [values[j + 1], values[j]];
                        addSwap(values[j]);
                        renderBars({ swap: [j, j + 1], sorted: getSortedTail(i) });
                        await waitForNextAction();
                    }
                }
            }
        }

        async function selectionSort() {
            const sorted = [];

            for (let i = 0; i < values.length - 1; i++) {
                let minIndex = i;

                for (let j = i + 1; j < values.length; j++) {
                    renderBars({ compare: [minIndex, j], current: [i], sorted });
                    await waitForNextAction();

                    addComparison(values[j]);

                    if (values[j] < values[minIndex]) {
                        minIndex = j;
                    }
                }

                if (minIndex !== i) {
                    [values[i], values[minIndex]] = [values[minIndex], values[i]];
                    addSwap(values[i]);
                    renderBars({ swap: [i, minIndex], sorted });
                    await waitForNextAction();
                }

                sorted.push(i);
            }
        }

        async function insertionSort() {
            const sorted = [0];

            for (let i = 1; i < values.length; i++) {
                const currentValue = values[i];
                let j = i - 1;

                renderBars({ compare: [i, j], current: [i], sorted });
                await waitForNextAction();

                while (j >= 0) {
                    addComparison(values[j]);

                    if (values[j] <= currentValue) {
                        break;
                    }

                    values[j + 1] = values[j];
                    addSwap(values[j + 1]);
                    renderBars({ compare: [j, j + 1], swap: [j + 1], sorted });
                    await waitForNextAction();
                    j--;
                }

                values[j + 1] = currentValue;
                addSwap(currentValue);
                renderBars({ swap: [j + 1], sorted });
                await waitForNextAction();
                sorted.push(i);
            }
        }

        async function quickSort(start = 0, end = values.length - 1) {
            if (start >= end) return;

            const pivotIndex = await partition(start, end);
            await quickSort(start, pivotIndex - 1);
            await quickSort(pivotIndex + 1, end);
        }

        async function partition(start, end) {
            const pivotValue = values[end];
            let pivotIndex = start;

            for (let i = start; i < end; i++) {
                renderBars({
                    compare: [i],
                    pivot: [end],
                    current: [pivotIndex],
                    range: getRangeIndices(start, end)
                });
                await waitForNextAction();

                addComparison(values[i]);

                if (values[i] < pivotValue) {
                    [values[i], values[pivotIndex]] = [values[pivotIndex], values[i]];
                    addSwap(values[pivotIndex]);
                    renderBars({
                        swap: [i, pivotIndex],
                        pivot: [end],
                        range: getRangeIndices(start, end)
                    });
                    await waitForNextAction();
                    pivotIndex++;
                }
            }

            [values[pivotIndex], values[end]] = [values[end], values[pivotIndex]];
            addSwap(values[pivotIndex]);
            renderBars({
                swap: [pivotIndex, end],
                pivot: [pivotIndex],
                range: getRangeIndices(start, end)
            });
            await waitForNextAction();

            return pivotIndex;
        }

        async function mergeSort(start = 0, end = values.length - 1) {
            if (start >= end) return;

            const middle = Math.floor((start + end) / 2);
            await mergeSort(start, middle);
            await mergeSort(middle + 1, end);
            await merge(start, middle, end);
        }

        async function merge(start, middle, end) {
            const left = values.slice(start, middle + 1);
            const right = values.slice(middle + 1, end + 1);
            let leftIndex = 0;
            let rightIndex = 0;
            let mainIndex = start;

            while (leftIndex < left.length && rightIndex < right.length) {
                renderBars({
                    compare: [start + leftIndex, middle + 1 + rightIndex],
                    current: [mainIndex],
                    range: getRangeIndices(start, end)
                });
                await waitForNextAction();

                addComparison(values[mainIndex]);

                if (left[leftIndex] <= right[rightIndex]) {
                    values[mainIndex] = left[leftIndex];
                    leftIndex++;
                } else {
                    values[mainIndex] = right[rightIndex];
                    rightIndex++;
                }

                addSwap(values[mainIndex]);
                renderBars({
                    swap: [mainIndex],
                    current: [mainIndex],
                    range: getRangeIndices(start, end)
                });
                await waitForNextAction();
                mainIndex++;
            }

            while (leftIndex < left.length) {
                values[mainIndex] = left[leftIndex];
                addSwap(values[mainIndex]);
                renderBars({
                    compare: [start + leftIndex],
                    swap: [mainIndex],
                    current: [mainIndex],
                    range: getRangeIndices(start, end)
                });
                await waitForNextAction();
                leftIndex++;
                mainIndex++;
            }

            while (rightIndex < right.length) {
                values[mainIndex] = right[rightIndex];
                addSwap(values[mainIndex]);
                renderBars({
                    compare: [middle + 1 + rightIndex],
                    swap: [mainIndex],
                    current: [mainIndex],
                    range: getRangeIndices(start, end)
                });
                await waitForNextAction();
                rightIndex++;
                mainIndex++;
            }
        }

        async function heapSort() {
            const length = values.length;

            for (let i = Math.floor(length / 2) - 1; i >= 0; i--) {
                await heapify(length, i);
            }

            for (let end = length - 1; end > 0; end--) {
                [values[0], values[end]] = [values[end], values[0]];
                addSwap(values[end]);
                renderBars({
                    swap: [0, end],
                    sorted: getSortedTail(length - 1 - end),
                    range: getRangeIndices(0, end)
                });
                await waitForNextAction();
                await heapify(end, 0);
            }
        }

        async function heapify(heapSize, rootIndex) {
            let largest = rootIndex;
            const left = 2 * rootIndex + 1;
            const right = 2 * rootIndex + 2;
            const sorted = getSortedTail(values.length - heapSize);
            const range = getRangeIndices(0, heapSize - 1);

            if (left < heapSize) {
                renderBars({ compare: [largest, left], pivot: [largest], current: [left], sorted, range });
                await waitForNextAction();
                addComparison(values[left]);

                if (values[left] > values[largest]) {
                    largest = left;
                }
            }

            if (right < heapSize) {
                renderBars({ compare: [largest, right], pivot: [largest], current: [right], sorted, range });
                await waitForNextAction();
                addComparison(values[right]);

                if (values[right] > values[largest]) {
                    largest = right;
                }
            }

            if (largest !== rootIndex) {
                [values[rootIndex], values[largest]] = [values[largest], values[rootIndex]];
                addSwap(values[rootIndex]);
                renderBars({ swap: [rootIndex, largest], pivot: [largest], sorted, range });
                await waitForNextAction();
                await heapify(heapSize, largest);
            }
        }

        async function shellSort() {
            let gap = Math.floor(values.length / 2);

            while (gap > 0) {
                for (let i = gap; i < values.length; i++) {
                    const temp = values[i];
                    let j = i;

                    renderBars({ compare: [i, j - gap], current: [i], range: getRangeIndices(0, values.length - 1) });
                    await waitForNextAction();

                    while (j >= gap) {
                        addComparison(values[j - gap]);

                        if (values[j - gap] <= temp) {
                            break;
                        }

                        values[j] = values[j - gap];
                        addSwap(values[j]);
                        renderBars({ compare: [j, j - gap], swap: [j], current: [j], range: getRangeIndices(0, values.length - 1) });
                        await waitForNextAction();
                        j -= gap;
                    }

                    values[j] = temp;
                    addSwap(temp);
                    renderBars({ swap: [j], current: [j], range: getRangeIndices(0, values.length - 1) });
                    await waitForNextAction();
                }

                gap = Math.floor(gap / 2);
            }
        }

        async function startSort() {
            if (isSorting) return;

            resetStats();
            isPaused = false;
            stepRequested = false;
            setSortingState(true);
            startTimer();
            statusText.textContent = `Running ${algorithmSelect.options[algorithmSelect.selectedIndex].text}...`;

            const algorithm = algorithmSelect.value;

            if (algorithm === "bubble") {
                await bubbleSort();
            } else if (algorithm === "selection") {
                await selectionSort();
            } else if (algorithm === "insertion") {
                await insertionSort();
            } else if (algorithm === "quick") {
                await quickSort();
            } else if (algorithm === "merge") {
                await mergeSort();
            } else if (algorithm === "heap") {
                await heapSort();
            } else if (algorithm === "shell") {
                await shellSort();
            }

            await markAllSorted();
            stopTimer();
            setSortingState(false);
            statusText.textContent = "Sorting complete.";
        }

        randomizeBtn.addEventListener("click", generateArray);
        sortBtn.addEventListener("click", startSort);
        pauseBtn.addEventListener("click", pauseSort);
        resumeBtn.addEventListener("click", resumeSort);
        stepBtn.addEventListener("click", stepSort);

        algorithmSelect.addEventListener("change", () => {
            updateDescription();

            if (!isSorting) {
                generateArray();
                statusText.textContent = `${algorithmSelect.options[algorithmSelect.selectedIndex].text} selected. Array randomized.`;
            }
        });

        sizeSlider.addEventListener("input", () => {
            sizeValue.textContent = sizeSlider.value;
            generateArray();
        });

        speedSlider.addEventListener("input", () => {
            speedValue.textContent = `${speedSlider.value}ms`;
        });

        updateDescription();
        generateArray();
    </script>
</body>
</html>
